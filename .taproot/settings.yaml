version: 1
root: taproot/
commit_pattern: 'taproot\(([^)]+)\):'
commit_trailer: Taproot
agents:
  - claude
  - cursor
  - generic

definitionOfDone:
  - document-current: check README.md Install section — every active distribution channel (Homebrew, Snap, AUR, curl, cargo) must have install instructions; add any that are missing

validation:
  require_dates: true
  require_status: true
  allowed_intent_states:
    - draft
    - active
    - achieved
    - deprecated
  allowed_behaviour_states:
    - proposed
    - specified
    - implemented
    - tested
    - deprecated
    - deferred
  allowed_impl_states:
    - planned
    - in-progress
    - complete
    - needs-rework
    - deferred
